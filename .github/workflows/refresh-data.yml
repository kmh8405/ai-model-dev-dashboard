name: Refresh dashboard data

on:
  schedule:
    - cron: '0 21 * * *'  # 06:00 KST daily
  workflow_dispatch: {}

# Hugging Face can (and did, on 2026-07-11) redeliver the same webhook
# several times in quick succession, dispatching this workflow more than
# once for the same underlying update. Queue duplicates instead of running
# them in parallel so they can't race each other on the final git push.
concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Fetch latest lmarena snapshot into Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/fetch_hf_to_supabase.py

      - name: Rebuild data.json from Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/build_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git diff --cached --quiet && echo "No data changes." || git commit -m "Refresh data.json from Supabase"
          git pull --rebase origin main
          git push
